<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <h1>Generate a <span id="h1-green">Random Password</span></h1>
        <h2>Never use an insecure password again</h2>
        <button id="gen-btn">Generate Password</button>
        <h4>Insert Password Length 5 - 23 Characters</h4>
        <input id="char-length" type="number" id="length" min="5" max="23" value="15">
        <div id="separator"></div>
        <div id="passwords">
            <div class="pass-style">
                <p id="randomp-1" class="randomp-style">YourSecurePassword</p>
            </div>
            <div class="pass-style">
                <p id="randomp-2" class="randomp-style">YourSecurePassword</p>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
